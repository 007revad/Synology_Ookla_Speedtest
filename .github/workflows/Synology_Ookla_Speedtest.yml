name: Build n Release Synology Ookla Speedtest Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-spk:
    name: Build Package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ['kvmx64']
        #arch: ['noarch']
        #dsm: ['7.0','7.1','7.2','7.3']
        dsm: ['7.0']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release tag
        id: get_latest_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "new_tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            latest_tag=$(curl -s https://api.github.com/repos/007revad/Synology_Ookla_Speedtest/releases/latest | jq -r .tag_name)
            echo "new_tag=$latest_tag" >> $GITHUB_OUTPUT
          fi

      - name: Synology Package Builder Github Action
        uses: tomgrv/synology-package-builder@v1.3.0
        with:
          dsm: ${{ matrix.dsm }}
          arch: ${{ matrix.arch }}
          output: ./dist

      - name: Remove debug spk and rename package
        run: |
          ls -l ./dist
          rm ./dist/*_debug.spk
          for f in ./dist/*.spk; do
            mv "$f" "${f%.spk}-${{ matrix.dsm }}.spk"
          done
          ls -l ./dist

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: SynoSpeedtest-${{ matrix.dsm }}
          path: ./dist/*.spk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_latest_tag.outputs.new_tag }}
          make_latest: false
          files: |
            ./dist/*.spk
